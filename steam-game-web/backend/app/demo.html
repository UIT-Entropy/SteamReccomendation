<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>" />
  <title>Steam Games Intelligence Hub (Local Demo)</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel Standalone CDN to compile JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            steam: {
              darkBg: "#0b1622",
              cardBg: "#16202d",
              cardBgHover: "#1f2d40",
              blue: "#66c0f4",
              green: "#a3cf06",
              darkBlue: "#171a21",
              accent: "#4b6d92",
              priceGreen: "#5c7e10",
              lightBg: "#2a475e",
              badgeBorder: "#3d6482"
            }
          },
          fontFamily: {
            sans: ['Inter', 'Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #0b1622;
      color: #cbd5e1;
      scrollbar-width: thin;
      scrollbar-color: #1f2d40 #0b1622;
    }
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0b1622;
    }
    ::-webkit-scrollbar-thumb {
      background: #1f2d40;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #66c0f4;
    }
    .shimmer {
      background: linear-gradient(90deg, #16202d 25%, #1f2d40 50%, #16202d 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .transition-glow:hover {
      box-shadow: 0 0 20px rgba(102, 192, 244, 0.2);
      border-color: rgba(102, 192, 244, 0.4);
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>

  <!-- React JSX App Script -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- REUSABLE SVG ICONS COMPONENT ---
    function Icon({ name, className = "h-4 w-4" }) {
      const icons = {
        gamepad: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line>
            <line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line>
            <rect x="2" y="6" width="20" height="12" rx="3"></rect>
          </svg>
        ),
        compass: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
          </svg>
        ),
        sparkles: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707-.707M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"></path>
          </svg>
        ),
        home: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        ),
        calendar: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
        ),
        user: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>
          </svg>
        ),
        bag: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path>
          </svg>
        ),
        thumbsup: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path>
          </svg>
        ),
        thumbsdown: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-3"></path>
          </svg>
        ),
        monitor: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line>
          </svg>
        ),
        harddrive: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <line x1="22" y1="12" x2="2" y2="12"></line><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path><line x1="6" y1="16" x2="6.01" y2="16"></line><line x1="10" y1="16" x2="10.01" y2="16"></line>
          </svg>
        ),
        cpu: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <rect x="4" y="4" width="16" height="16" rx="2"></rect><rect x="9" y="9" width="6" height="6"></rect><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 15h3M1 9h3M1 15h3"></path>
          </svg>
        ),
        external: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line>
          </svg>
        ),
        info: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
        ),
        search: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        ),
        x: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        ),
        filter: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
          </svg>
        ),
        reset: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
          </svg>
        ),
        arrowupdown: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <polyline points="17 4 21 8 17 12"></polyline><line x1="21" y1="8" x2="9" y2="8"></line>
            <polyline points="7 20 3 16 7 12"></polyline><line x1="3" y1="16" x2="15" y2="16"></line>
          </svg>
        ),
        chevronleft: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        ),
        chevronright: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        ),
        ghost: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <path d="M9 10h.01M15 10h.01M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"></path>
          </svg>
        ),
        spinner: (
          <svg class={`animate-spin ${className}`} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        ),
        database: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"></path>
          </svg>
        ),
        tag: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line>
          </svg>
        ),
        message: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
        ),
        award: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" class={className}>
            <circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline>
          </svg>
        )
      };
      return icons[name] || null;
    }

    // --- API CLIENT ---
    const API_BASE_URL = window.location.origin === "http://localhost:3000" || window.location.hostname === "localhost" 
      ? "http://localhost:8000" 
      : window.location.origin;

    async function apiGet(endpoint, params = {}) {
      const url = new URL(`${API_BASE_URL}${endpoint}`);
      Object.keys(params).forEach(key => {
        if (params[key] !== undefined && params[key] !== null && params[key] !== "") {
          url.searchParams.append(key, params[key]);
        }
      });
      const response = await fetch(url.toString());
      if (!response.ok) throw new Error(response.statusText);
      return response.json();
    }

    // --- COMPONENTS ---

    function Navbar({ currentPage, onNavigate }) {
      return (
        <header class="bg-steam-darkBlue border-b border-steam-accent/30 sticky top-0 z-50 shadow-md">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
              <div class="flex items-center space-x-2 cursor-pointer" onClick={() => onNavigate('home')}>
                <div class="bg-steam-blue text-steam-darkBg p-2 rounded-lg shadow-steam-glow">
                  <Icon name="gamepad" class="h-6 w-6 font-bold" />
                </div>
                <div>
                  <span class="text-xl font-bold tracking-wider font-display bg-gradient-to-r from-steam-blue to-teal-400 bg-clip-text text-transparent">
                    STEAM GAMES
                  </span>
                  <span class="text-xs block text-steam-accent font-semibold tracking-widest uppercase -mt-1">
                    Intelligence Hub
                  </span>
                </div>
              </div>
              <nav class="flex space-x-4">
                <button 
                  onClick={() => onNavigate('home')} 
                  class={`flex items-center space-x-2 px-3 py-2 rounded-md text-sm font-medium transition-colors ${
                    currentPage === 'home' ? 'bg-steam-lightBg text-steam-blue' : 'text-slate-400 hover:text-slate-100'
                  }`}
                >
                  <Icon name="home" />
                  <span class="hidden sm:inline">Home</span>
                </button>
                <button 
                  onClick={() => onNavigate('explore')} 
                  class={`flex items-center space-x-2 px-3 py-2 rounded-md text-sm font-medium transition-colors ${
                    currentPage === 'explore' || currentPage === 'detail' ? 'bg-steam-lightBg text-steam-blue' : 'text-slate-400 hover:text-slate-100'
                  }`}
                >
                  <Icon name="compass" />
                  <span class="hidden sm:inline">Explore Games</span>
                </button>
                <button 
                  onClick={() => onNavigate('recommend')} 
                  class={`flex items-center space-x-2 px-3 py-2 rounded-md text-sm font-medium transition-colors ${
                    currentPage === 'recommend' ? 'bg-steam-lightBg text-steam-blue' : 'text-slate-400 hover:text-slate-100'
                  }`}
                >
                  <Icon name="sparkles" />
                  <span class="hidden sm:inline">Recommendations</span>
                </button>
              </nav>
            </div>
          </div>
        </header>
      );
    }

    function TagBadge({ tag, onClick }) {
      return (
        <span
          onClick={(e) => {
            if (onClick) {
              e.stopPropagation();
              onClick(tag);
            }
          }}
          class={`inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-steam-lightBg/50 text-steam-blue border border-steam-badgeBorder/40 transition-all ${
            onClick ? 'cursor-pointer hover:bg-steam-blue hover:text-steam-darkBg' : ''
          }`}
        >
          {tag}
        </span>
      );
    }

    function GameCard({ game, onViewDetail, onViewRecommendations, onTagClick }) {
      const [imgSrc, setImgSrc] = useState(game.Thumbnail);
      const isFree = game.price === 0;

      // Handle review category
      const getReviewColor = (score) => {
        if (score >= 7) return "text-emerald-400 bg-emerald-500/10";
        if (score >= 5) return "text-yellow-500 bg-yellow-500/10";
        return "text-red-500 bg-red-500/10";
      };

      const getReviewText = (score) => {
        if (score >= 9) return "Overwhelmingly Positive";
        if (score >= 8) return "Very Positive";
        if (score >= 7) return "Positive";
        if (score >= 6) return "Mostly Positive";
        if (score >= 5) return "Mixed";
        if (score >= 4) return "Mostly Negative";
        return "Negative";
      };

      return (
        <div class="bg-steam-cardBg border border-steam-accent/20 rounded-lg overflow-hidden flex flex-col h-full hover:-translate-y-1.5 transition-transform duration-300 shadow-lg hover:shadow-steam-glow group">
          <div class="relative aspect-[16/9] w-full overflow-hidden cursor-pointer" onClick={() => onViewDetail(game.game_id)}>
            <img
              src={imgSrc}
              alt={game.Name}
              onError={() => setImgSrc("https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=600&auto=format&fit=crop")}
              class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
              loading="lazy"
            />
            {game.similarity_score !== undefined && (
              <div class="absolute top-2 right-2 bg-steam-darkBg/90 border border-steam-blue/60 text-steam-blue text-xs font-bold px-2 py-1 rounded shadow-md flex items-center space-x-1 backdrop-blur-sm">
                <span>Match:</span>
                <span class="text-white">{(game.similarity_score * 100).toFixed(0)}%</span>
              </div>
            )}
            <div class={`absolute bottom-2 right-2 px-2.5 py-0.5 rounded text-xs font-bold shadow-md ${
              isFree ? 'bg-steam-priceGreen text-steam-green' : 'bg-steam-darkBg/95 text-steam-blue border border-steam-blue/20'
            }`}>
              {game.price_display}
            </div>
          </div>

          <div class="p-4 flex flex-col flex-grow">
            <h3 onClick={() => onViewDetail(game.game_id)} class="font-display font-bold text-base text-slate-100 hover:text-steam-blue transition-colors line-clamp-1 cursor-pointer mb-1">
              {game.Name}
            </h3>

            <div class="flex items-center justify-between text-xs text-slate-400 mb-3">
              <span class="truncate pr-2 max-w-[65%]">{game.Developers}</span>
              <span class="flex items-center shrink-0">
                <Icon name="calendar" class="h-3 w-3 mr-1" />
                {game.release_year > 0 ? game.release_year : 'N/A'}
              </span>
            </div>

            <div class="flex flex-wrap gap-1 mb-3 mt-auto">
              {game.tag_list && game.tag_list.slice(0, 3).map((tag, idx) => (
                <TagBadge key={idx} tag={tag} onClick={onTagClick} />
              ))}
            </div>

            <div class={`flex items-center space-x-2 text-xs px-2 py-1.5 rounded ${getReviewColor(game.ReviewScore)} mb-4`}>
              <Icon name="thumbsup" class="h-3.5 w-3.5" />
              <span class="font-medium truncate">{getReviewText(game.ReviewScore)}</span>
              <span class="text-slate-400">({Math.round(game.ReviewRatio * 100)}%)</span>
            </div>

            {game.explanation && (
              <div class="text-xs border-t border-steam-accent/15 pt-2.5 mb-4 text-steam-blue/80 italic line-clamp-2">
                {game.explanation}
              </div>
            )}

            <div class="grid grid-cols-2 gap-2 mt-auto">
              <button onClick={() => onViewDetail(game.game_id)} class="bg-steam-lightBg/40 border border-steam-accent/30 hover:bg-steam-lightBg/75 text-slate-100 py-1.5 px-2 rounded text-xs font-semibold">
                Details
              </button>
              <button onClick={() => onViewRecommendations(game.game_id)} class="bg-steam-blue text-steam-darkBg hover:bg-sky-300 font-bold py-1.5 px-2 rounded text-xs shadow-md">
                Similar Games
              </button>
            </div>
          </div>
        </div>
      );
    }

    function GameGrid({ games, onViewDetail, onViewRecommendations, onTagClick }) {
      if (!games || games.length === 0) {
        return (
          <div class="flex flex-col items-center justify-center py-20 px-4 text-center border border-dashed border-steam-accent/20 rounded-xl bg-steam-cardBg/30">
            <Icon name="ghost" class="h-16 w-16 text-slate-500 mb-4 animate-bounce" />
            <h3 class="text-xl font-semibold text-slate-300 mb-2">No games found</h3>
            <p class="text-slate-500 max-w-md">We couldn't find any Steam games matching your criteria.</p>
          </div>
        );
      }
      return (
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
          {games.map(game => (
            <GameCard
              key={game.game_id}
              game={game}
              onViewDetail={onViewDetail}
              onViewRecommendations={onViewRecommendations}
              onTagClick={onTagClick}
            />
          ))}
        </div>
      );
    }

    function StatCard({ label, value, icon, color }) {
      return (
        <div class="bg-steam-cardBg border border-steam-accent/20 rounded-lg p-5 shadow-lg flex items-center space-x-4">
          <div class="p-3 rounded-lg bg-steam-darkBg">

          </div>
        </div>
      );

    function Pagination({ currentPage, totalPages, onPageChange }) {
      if (totalPages <= 1) return null;

      const getPageNumbers = () => {
        const pages = [];
        const delta = 2;
        const start = Math.max(2, currentPage - delta);
        const end = Math.min(totalPages - 1, currentPage + delta);
        pages.push(1);
        if (start > 2) pages.push('ellipsis1');
        for (let i = start; i <= end; i++) pages.push(i);
        if (end < totalPages - 1) pages.push('ellipsis2');
        if (totalPages > 1) pages.push(totalPages);
        return pages;
      };

      return (
        <div class="flex items-center justify-center space-x-2 mt-8">
          <button 
            onClick={() => onPageChange(currentPage - 1)} 
            disabled={currentPage === 1}
            class="bg-steam-cardBg border border-steam-accent/20 hover:border-steam-blue text-slate-300 p-2 rounded disabled:opacity-40"
          >
            <Icon name="chevronleft" />
          </button>

          {getPageNumbers().map((p, idx) => {
            if (p === 'ellipsis1' || p === 'ellipsis2') return <span key={idx} class="text-slate-500">...</span>;
            return (
              <button
                key={p}
                onClick={() => onPageChange(p)}
                class={`px-3 py-1.5 rounded text-sm font-semibold border ${
                  p === currentPage ? 'bg-steam-blue text-steam-darkBg border-steam-blue font-bold shadow-steam-glow' : 'bg-steam-cardBg border-steam-accent/20 text-slate-300'
                }`}
              >
                {p}
              </button>
            );
          })}

          <button 
            onClick={() => onPageChange(currentPage + 1)} 
            disabled={currentPage === totalPages}
            class="bg-steam-cardBg border border-steam-accent/20 hover:border-steam-blue text-slate-300 p-2 rounded disabled:opacity-40"
          >
            <Icon name="chevronright" />
          </button>
        </div>
      );
    }

    function Recommendation({ initialGameId, onNavigate, clearInitialGameId }) {
      const [searchVal, setSearchVal] = useState("");
      const [suggestions, setSuggestions] = useState([]);
      const [selectedGame, setSelectedGame] = useState(null);
      const [recommendations, setRecommendations] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [showDropdown, setShowDropdown] = useState(false);
      const dropdownRef = useRef(null);

      useEffect(() => {
        if (initialGameId !== undefined && initialGameId !== null) {
          handleSelectGameById(initialGameId);
          clearInitialGameId();
        }
      }, [initialGameId]);

      useEffect(() => {
        if (!searchVal.trim()) {
          setSuggestions([]);
          return;
        }
        apiGet("/autocomplete", { q: searchVal, limit: 6 })
          .then(data => {
            setSuggestions(data);
            setShowDropdown(data.length > 0);
          })
          .catch(console.error);
      }, [searchVal]);

      const handleSelectGameById = async (id) => {
        setLoading(true);
        setError(null);
        setShowDropdown(false);
        setSearchVal("");
        try {
          const detail = await apiGet(`/games/${id}`);
          setSelectedGame(detail);
          const recs = await apiGet(`/recommend/${id}`, { top_n: 12 });
          setRecommendations(recs);
        } catch (err) {
          setError("Failed to generate similarity recommendations.");
        } finally {
          setLoading(false);
        }
      };

      const handleNameSearch = async (e) => {
        e.preventDefault();
        if (!searchVal.trim()) return;
        setLoading(true);
        setError(null);
        try {
          const data = await apiGet("/recommend-by-name", { name: searchVal, top_n: 12 });
          if (data.selected_game) {
            setSelectedGame(data.selected_game);
            setRecommendations(data.recommendations);
            setSearchVal("");
          } else {
            setError(`No games matched "${searchVal}".`);
          }
        } catch (err) {
          setError("Search recommendation failed.");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div class="max-w-7xl mx-auto px-4 py-6 space-y-8">
          <section class="text-center max-w-3xl mx-auto space-y-3">
            <h1 class="text-3xl font-extrabold text-white font-display">Cosine Similarity Recommendations</h1>
            <p class="text-slate-400 text-sm">Select a game to run TF-IDF comparison metrics and find matches across our dataset.</p>
          </section>

          <div class="max-w-md mx-auto relative" ref={dropdownRef}>
            <form onSubmit={handleNameSearch} class="relative flex items-center">
              <input
                type="text"
                value={searchVal}
                onChange={e => setSearchVal(e.target.value)}
                placeholder="Type a game name (e.g., Witcher, Portal)..."
                class="w-full pl-4 pr-24 py-3 bg-steam-cardBg border border-steam-accent/30 rounded-lg text-slate-100 focus:outline-none focus:ring-2 focus:ring-steam-blue"
              />
              <button type="submit" class="absolute right-2 bg-steam-blue text-steam-darkBg font-bold px-3 py-1.5 rounded text-xs">
                Search
              </button>
            </form>

            {showDropdown && (
              <div class="absolute z-50 left-0 right-0 mt-1 bg-steam-cardBg border border-steam-accent/30 rounded-lg shadow-2xl max-h-60 overflow-y-auto">
                {suggestions.map(s => (
                  <div key={s.game_id} onClick={() => handleSelectGameById(s.game_id)} class="flex items-center space-x-3 p-3 hover:bg-steam-cardBgHover cursor-pointer">
                    <img src={s.Thumbnail} alt={s.Name} class="h-8 w-14 object-cover rounded" onError={e=>e.target.src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=100&auto=format&fit=crop"} />
                    <div class="min-w-0 flex-grow">
                      <p class="text-sm font-semibold text-slate-100 truncate">{s.Name}</p>
                      <p class="text-xs text-steam-blue font-bold">{s.price_display}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {error && <div class="text-center text-sm text-orange-400 bg-orange-400/5 p-3 rounded max-w-md mx-auto">{error}</div>}

          {loading ? (
            <div class="text-center py-20 text-slate-400">Loading vector matrices...</div>
          ) : selectedGame ? (
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
              <div class="lg:col-span-1 space-y-4">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-steam-accent/15 pb-2">Target Game</h2>
                <GameCard game={selectedGame} onViewDetail={(id) => onNavigate('detail', id)} onViewRecommendations={handleSelectGameById} onTagClick={(tag) => onNavigate('explore', { tag })} />
              </div>
              <div class="lg:col-span-3 space-y-6">
                <h2 class="text-sm font-bold text-slate-100 border-b border-steam-accent/15 pb-2">Recommended Similar Releases ({recommendations.length})</h2>
                <GameGrid games={recommendations} onViewDetail={(id) => onNavigate('detail', id)} onViewRecommendations={handleSelectGameById} onTagClick={(tag) => onNavigate('explore', { tag })} />
              </div>
            </div>
          ) : (
            <div class="text-center py-20 border border-dashed border-steam-accent/10 rounded-xl max-w-md mx-auto">
              <Icon name="gamepad" class="h-12 w-12 text-slate-600 mx-auto mb-3" />
              <p class="text-sm text-slate-400">Search for a game to calculate similarity ratings.</p>
            </div>
          )}
        </div>
      );
    }

    // --- APP CONTAINER ---

    function App() {
      const [currentPage, setCurrentPage] = useState('home');
      const [selectedGameId, setSelectedGameId] = useState(null);
      const [exploreParams, setExploreParams] = useState(null);
      const [recommendGameId, setRecommendGameId] = useState(null);

      const handleNavigate = (page, params = null) => {
        setCurrentPage(page);
        if (page === 'detail') {
          setSelectedGameId(params);
        } else if (page === 'explore' && params) {
          setExploreParams(params);
        } else if (page === 'recommend' && params) {
          setRecommendGameId(params);
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const clearExploreParams = () => setExploreParams(null);
      const clearRecommendGameId = () => setRecommendGameId(null);

      const renderPage = () => {
        if (currentPage === 'home') return <Home onNavigate={handleNavigate} />;
        if (currentPage === 'explore') {
          return (
            <Explore
              initialParams={exploreParams}
              onNavigate={handleNavigate}
              clearInitialParams={clearExploreParams}
            />
          );
        }
        if (currentPage === 'detail') {
          return (
            <GameDetail
              gameId={selectedGameId}
              onNavigate={handleNavigate}
            />
          );
        }
        if (currentPage === 'recommend') {
          return (
            <Recommendation
              initialGameId={recommendGameId}
              onNavigate={handleNavigate}
              clearInitialGameId={clearRecommendGameId}
            />
          );
        }
        return <Home onNavigate={handleNavigate} />;
      };

      return (
        <div class="min-h-screen bg-steam-darkBg flex flex-col justify-between text-slate-200">
          <div class="flex flex-col">
            <Navbar currentPage={currentPage} onNavigate={handleNavigate} />
            <main class="flex-grow pb-16">{renderPage()}</main>
          </div>
          <footer class="bg-steam-darkBlue border-t border-steam-accent/20 py-8 text-xs text-slate-500 mt-auto">
            <div class="max-w-7xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div class="flex items-center space-x-2">
                <div class="bg-slate-800 p-1.5 rounded text-slate-400">
                  <Icon name="gamepad" />
                </div>
                <div>
                  <p class="font-semibold text-slate-400">Steam Game Intelligence Hub</p>
                  <p>© 2026 Presentation Demo. Cleaned Dataset Platform.</p>
                </div>
              </div>
              <div class="flex space-x-6 text-slate-400">
                <button onClick={() => handleNavigate('home')} class="hover:text-steam-blue">Dashboard</button>
                <button onClick={() => handleNavigate('explore')} class="hover:text-steam-blue">Explorer</button>
                <button onClick={() => handleNavigate('recommend')} class="hover:text-steam-blue">Similarity Engine</button>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
